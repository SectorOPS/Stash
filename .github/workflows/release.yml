name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Bun supports cross-compilation via --target, so we don't actually need a
# separate runner per target. We pick the closest host to each artefact:
#   - darwin binaries built on macos-14 (Apple Silicon)
#   - linux binaries built on ubuntu-24.04 (x64)
# This avoids the long macos-13 (Intel) queue times for first-touch runs.
jobs:
  darwin:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [bun-darwin-arm64, bun-darwin-x64]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build + pack
        run: |
          short="${{ matrix.target }}"; short="${short#bun-}"
          version="${GITHUB_REF_NAME#v}"
          mkdir -p "dist/$short"
          bun build src/index.ts --compile --target=${{ matrix.target }} \
            --outfile "dist/$short/stash"
          chmod +x "dist/$short/stash"
          tar -C "dist/$short" -czf "dist/stash-$version-$short.tar.gz" stash
          shasum -a 256 "dist/stash-$version-$short.tar.gz" \
            > "dist/stash-$version-$short.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256

  linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [bun-linux-x64, bun-linux-arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build + pack
        run: |
          short="${{ matrix.target }}"; short="${short#bun-}"
          version="${GITHUB_REF_NAME#v}"
          mkdir -p "dist/$short"
          bun build src/index.ts --compile --target=${{ matrix.target }} \
            --outfile "dist/$short/stash"
          chmod +x "dist/$short/stash"
          tar -C "dist/$short" -czf "dist/stash-$version-$short.tar.gz" stash
          shasum -a 256 "dist/stash-$version-$short.tar.gz" \
            > "dist/stash-$version-$short.tar.gz.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
